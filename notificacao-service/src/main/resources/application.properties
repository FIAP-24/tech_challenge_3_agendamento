# Configuracao Local (padrao)
spring.application.name=notificacao-service

# Configuracao do Servidor
server.port=9091

# Configuracao do RabbitMQ (desabilitado temporariamente para desenvolvimento local)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=admin
spring.rabbitmq.password=admin123

# Nome da fila para notificacoes
rabbitmq.queue.name=notificacoes.queue
rabbitmq.exchange.name=notificacoes.exchange
rabbitmq.routing.key=notificacao.consulta

# Configuracao do servico de notificacao
notificacao.modo=LOG
notificacao.email.habilitado=true
notificacao.email.assunto-padrao=Notificacao de Consulta Medica
notificacao.email.template-padrao=Ola, voce tem uma nova notificacao sobre sua consulta medica.
notificacao.sms.habilitado=false
notificacao.sms.provedor=TWILIO
notificacao.sms.template-padrao=Lembrete: Voce tem uma consulta medica agendada.

# Configuracao do SMTP (habilitada para envio real de emails)
# Para usar email real, descomente e configure as variaveis abaixo:
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=${SMTP_USERNAME}
# spring.mail.password=${SMTP_PASSWORD}
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

# Configuracao SMTP para Gmail (exemplo)
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=seu_email@gmail.com
# spring.mail.password=sua_senha_de_app
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true
# spring.mail.properties.mail.smtp.starttls.required=true

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Logging
logging.level.com.challenge.notificacao=DEBUG
logging.level.org.springframework.amqp=DEBUG
logging.level.org.springframework.mail=DEBUG

# Configuracoes de retry para RabbitMQ
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.retry.multiplier=2.0
