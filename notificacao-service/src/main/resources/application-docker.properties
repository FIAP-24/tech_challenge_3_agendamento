# Configuracao Docker
spring.application.name=notificacao-service

# Configuracao do Servidor
server.port=9091

# Configuracao do RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:admin}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:admin123}

# Nome da fila para notificacoes
rabbitmq.queue.name=notificacoes.queue
rabbitmq.exchange.name=notificacoes.exchange
rabbitmq.routing.key=notificacao.consulta

# Configuracao do servico de notificacao
notificacao.modo=${NOTIFICACAO_MODO:LOG}
notificacao.email.habilitado=${EMAIL_HABILITADO:true}
notificacao.email.assunto-padrao=${EMAIL_ASSUNTO:Notificacao de Consulta Medica}
notificacao.email.template-padrao=${EMAIL_TEMPLATE:Ola, voce tem uma nova notificacao sobre sua consulta medica.}
notificacao.sms.habilitado=${SMS_HABILITADO:false}
notificacao.sms.provedor=${SMS_PROVEDOR:TWILIO}
notificacao.sms.template-padrao=${SMS_TEMPLATE:Lembrete: Voce tem uma consulta medica agendada.}

# Configuracao do SMTP
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
# Desabilitar health check de email para evitar falhas
management.health.mail.enabled=false

# Logging
logging.level.com.challenge.notificacao=INFO
logging.level.org.springframework.amqp=INFO
logging.level.org.springframework.mail=INFO

# Configuracoes de retry para RabbitMQ
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.retry.multiplier=2.0

