# ========================================
# COMO USAR:
# ========================================

# 1. Copie as configuracoes desejadas para seu application.properties
# 2. Configure as variaveis de ambiente:
#    export SMTP_USERNAME=seu_email@gmail.com
#    export SMTP_PASSWORD=sua_senha_de_app
# 3. Altere o modo de notificacao para EMAIL:
#    export NOTIFICACAO_MODO=EMAIL
# 4. Reinicie o servico

# ========================================
# NOTAS IMPORTANTES:
# ========================================

# - Para Gmail, use "Senha de App" nao a senha normal
# - Para Outlook, pode precisar habilitar "Acesso menos seguro"
# - Sempre use variaveis de ambiente para credenciais
# - Teste a configuracao com o endpoint de teste

