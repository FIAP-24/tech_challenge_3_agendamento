# Configuracao Local (padrao)
spring.application.name=agendamento

# Configuracao do Servidor
server.port=9090

# Configuracao do Banco de Dados H2 (em memoria)
spring.datasource.url=jdbc:h2:mem:agendamentodb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuracao do GraphQL
spring.graphql.graphiql.enabled=true
spring.graphql.schema.locations=classpath:graphql/

# Configuracao do RabbitMQ (desabilitado temporariamente)
# spring.rabbitmq.host=localhost
# spring.rabbitmq.port=5672
# spring.rabbitmq.username=user
# spring.rabbitmq.password=123456

# Configuracao RabbitMQ para notificacoes
rabbitmq.queue.name=notificacoes.queue
rabbitmq.exchange.name=notificacoes.exchange
rabbitmq.routing.key=notificacao.consulta

# Logging
logging.level.com.challenge.agendamento=DEBUG
logging.level.org.springframework.amqp=DEBUG