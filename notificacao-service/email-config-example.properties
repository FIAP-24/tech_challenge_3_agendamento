# ========================================
# CONFIGURACAO DE EMAIL - EXEMPLO
# ========================================

# Para habilitar envio real de emails, adicione estas configuracoes
# ao seu application.properties ou application-docker.properties

# ========================================
# CONFIGURACAO GMAIL
# ========================================

# Host e porta do Gmail
spring.mail.host=smtp.gmail.com
spring.mail.port=587

# Credenciais (use variaveis de ambiente para seguranca)
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}

# Configuracoes de seguranca
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Configuracoes adicionais para Gmail
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2

