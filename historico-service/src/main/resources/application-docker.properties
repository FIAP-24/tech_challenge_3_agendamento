# Perfil Docker
spring.profiles.active=docker

# Configuraçăo do Banco de Dados PostgreSQL
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://historico-db:5432/historico}
spring.datasource.username=historico
spring.datasource.password=historico123
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Configuraçăo do RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:admin}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:admin123}

# Desabilita o GraphiQL em ambiente Docker
spring.graphql.graphiql.enabled=false